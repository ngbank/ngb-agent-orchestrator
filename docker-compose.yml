# Local-dev wiring for the orchestrator HTTP server.
#
# Usage:
#   docker compose up --build              # build + run in the foreground
#   docker compose up -d                   # detached
#   docker compose logs -f orchestrator    # follow logs
#   docker compose down                    # stop (host state dir persists)
#
# Smoke test once it's up:
#   curl http://localhost:8080/healthz
#
# State layout:
#   The host's XDG state dir is bind-mounted into the container so logs are
#   accessible from the host (e.g. `tail -f`):
#
#     ${XDG_STATE_HOME:-$HOME/.local/state}/ngb-agent-orchestrator/
#     └── logs/<workflow_id>/...
#
#   The SQLite DB lives in a Docker-managed *named volume* mounted over the
#   `db/` subdirectory. Reason: SQLite's file-locking and fsync semantics are
#   not reliable over macOS bind mounts (Colima virtiofs, Docker Desktop
#   gRPC-FUSE) and cause `disk I/O error` / `database disk image is malformed`
#   under load. Named volumes live on the VM's ext4 filesystem and behave
#   like a native disk. Host CLI access to the DB is not needed because the
#   dispatcher talks to the server over HTTP (ORCHESTRATOR_MODE=remote).
#
#   To inspect the DB from the host:
#     docker cp ngb-orchestrator:/home/orchestrator/.local/state/ngb-agent-orchestrator/db/local.db /tmp/local.db
#     sqlite3 /tmp/local.db
#
#   Note: on Linux the container runs as UID 1001 (the `orchestrator` user);
#   bind-mounted files inherit that ownership. On macOS this is transparently
#   remapped by the VM's user namespace.
#
# To point the dispatcher at this server:
#   export ORCHESTRATOR_MODE=remote
#   export ORCHESTRATOR_URL=http://localhost:8080
#   # plus ORCHESTRATOR_TOKEN if ORCHESTRATOR_API_TOKEN is set in .env
#
# Prefer `docker compose` over raw `docker run --env-file .env`: unlike
# Python's load_dotenv(), `docker run --env-file` does not strip quotes from
# values (e.g. JIRA_URL="https://...") and passes them through literally,
# breaking anything that parses them as URLs. Compose's env_file handling
# does not have this problem.

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Optional override for the pinned goose CLI version. Default (empty)
        # falls back to the version in `.goose-version`. See AOS-205.
        GOOSE_VERSION: "${GOOSE_VERSION:-}"
    image: ngb-orchestrator:dev
    container_name: ngb-orchestrator
    # Inject `tini` as PID 1 so Python's subprocesses (goose + litellm proxy
    # and any grandchildren they orphan) get reaped and SIGCHLD is delivered
    # properly. Without this, running as PID 1 wedges the anyio threadpool
    # the moment a workflow subprocess starts, taking `/healthz` and every
    # other route down with it. Podman used to inject an init for us; Docker
    # Engine (which Colima runs) does not — you have to opt in.
    init: true
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ORCHESTRATOR_HOST: "0.0.0.0"
      ORCHESTRATOR_PORT: "8080"
      ORCHESTRATOR_LOG_LEVEL: "info"
      # .env's GOOSE_MCP_PYTHON is a host-absolute path written by
      # setup-env.sh (e.g. /Users/.../.venv/bin/python) for the host CLI.
      # That path doesn't exist in the container, which breaks the
      # generate_code recipe's stdio MCP extension. Override it here so the
      # container falls back to its own `python` on PATH.
      GOOSE_MCP_PYTHON: "python"
    volumes:
      # Bind mount for logs so `tail -f` from the host works.
      - ${XDG_STATE_HOME:-$HOME/.local/state}/ngb-agent-orchestrator:/home/orchestrator/.local/state/ngb-agent-orchestrator
      # Named volume overlaid on the `db/` subdirectory. See the file header
      # for why the DB cannot live on the bind mount.
      - orchestrator-db:/home/orchestrator/.local/state/ngb-agent-orchestrator/db
    restart: unless-stopped

volumes:
  orchestrator-db:
