# Local-dev wiring for the orchestrator HTTP server.
#
# Usage:
#   docker compose up --build              # build + run in the foreground
#   docker compose up -d                   # detached
#   docker compose logs -f orchestrator    # follow logs
#   docker compose down                    # stop (host state dir persists)
#
# Smoke test once it's up:
#   curl http://localhost:8080/healthz
#
# State layout:
#   The host's XDG state dir is bind-mounted into the container, so the
#   containerised server and the local CLI share one database and one logs
#   tree by default:
#
#     ${XDG_STATE_HOME:-$HOME/.local/state}/ngb-agent-orchestrator/
#     ├── db/local.db
#     └── logs/<workflow_id>/...
#
#   Note: on Linux the container runs as UID 1001 (the `orchestrator` user);
#   bind-mounted files inherit that ownership. On macOS / Podman this is
#   transparently remapped by the VM's user namespace.
#
# To point the dispatcher at this server:
#   export ORCHESTRATOR_MODE=remote
#   export ORCHESTRATOR_URL=http://localhost:8080
#   # plus ORCHESTRATOR_TOKEN if ORCHESTRATOR_API_TOKEN is set in .env
#
# Prefer `docker compose` over raw `docker run --env-file .env`: unlike
# Python's load_dotenv(), `docker run --env-file` does not strip quotes from
# values (e.g. JIRA_URL="https://...") and passes them through literally,
# breaking anything that parses them as URLs. Compose's env_file handling
# does not have this problem.

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ngb-orchestrator:dev
    container_name: ngb-orchestrator
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ORCHESTRATOR_HOST: "0.0.0.0"
      ORCHESTRATOR_PORT: "8080"
      ORCHESTRATOR_LOG_LEVEL: "info"
      # .env's GOOSE_MCP_PYTHON is a host-absolute path written by
      # setup-env.sh (e.g. /Users/.../.venv/bin/python) for the host CLI.
      # That path doesn't exist in the container, which breaks the
      # generate_code recipe's stdio MCP extension. Override it here so the
      # container falls back to its own `python` on PATH.
      GOOSE_MCP_PYTHON: "python"
    volumes:
      - ${XDG_STATE_HOME:-$HOME/.local/state}/ngb-agent-orchestrator:/home/orchestrator/.local/state/ngb-agent-orchestrator
    restart: unless-stopped
