# LiteLLM Proxy Configuration
# Runs as a local OpenAI-compatible endpoint (default: http://localhost:4000)
# All sensitive values are injected from environment variables — do NOT hardcode credentials here.
#
# Start the proxy:
#   litellm --config config/litellm.yaml --port 4000
#
# Callers select a model by passing "model": "<model_name>" in the request body.
# GOOSE_MODEL in .env sets the default model Goose uses.

model_list:
  # Azure AI Foundry / Azure OpenAI
  - model_name: azure-gpt4
    litellm_params:
      model: azure/${AZURE_DEPLOYMENT_NAME}
      api_key: ${AZURE_API_KEY}
      api_base: ${AZURE_API_BASE}
      api_version: ${AZURE_API_VERSION}

  # Anthropic
  - model_name: claude
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: ${ANTHROPIC_API_KEY}

  # OpenAI
  - model_name: gpt4o
    litellm_params:
      model: gpt-4o
      api_key: ${OPENAI_API_KEY}

general_settings:
  master_key: ${LITELLM_MASTER_KEY}  # auth key for the proxy API

litellm_settings:
  drop_params: true  # silently drop unsupported provider params for cross-provider compatibility
