version: "1.0.0"
title: "WorkPlan Executor"
description: "Execute an approved WorkPlan by implementing code changes in a feature branch"

parameters:
  - key: ticket_key
    input_type: string
    requirement: required
    description: "JIRA ticket key (e.g., AOS-41, MINIBANK-123)"

  - key: work_plan_path
    input_type: string
    requirement: required
    description: "Path to the approved WorkPlan JSON file"

  - key: working_dir
    input_type: string
    requirement: required
    description: "Absolute path to the cloned target repository (e.g. /tmp/ngb-execute-<uuid>)"

  - key: output_path
    input_type: string
    requirement: required
    description: "Path where the execution summary JSON will be written"

  - key: reasoning_path
    input_type: string
    requirement: required
    description: "Path where the pre-execution reasoning and execution diary will be written (outside working_dir, never committed)"

  - key: GOOSE_MCP_PYTHON
    input_type: string
    requirement: optional
    description: "Python interpreter used to launch the MCP server (defaults to 'python')"
    default: "python"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true
    description: "File system and shell command access for reading files, running commands, and making code changes"
  - type: stdio
    name: agent-harness
    display_name: Agent Harness
    cmd: "{{ GOOSE_MCP_PYTHON | default('python') }}"
    args:
      - "-m"
      - "mcp_server.server"
    description: "MCP tools: get_repo_for_project and get_developer_rules"
    bundled: false

settings:
  temperature: 0.1
  max_turns: 100

response:
  json_schema:
    type: object
    required:
      - ticket_key
      - branch
      - build
      - tests
      - files_changed
      - commit_sha
      - pr_url
      - status
    properties:
      ticket_key:
        type: string
      branch:
        type: string
      build:
        type: string
        enum: [pass, fail]
      tests:
        type: string
        enum: [pass, fail, skipped]
      files_changed:
        type: array
        items:
          type: string
      commit_sha:
        type: string
      pr_url:
        type: string
      status:
        type: string
        enum: [success, partial, failed]
      error:
        type: string

prompt: |
  You are a code execution agent that implements approved WorkPlans by making precise code changes to a repository.

  ## Your Task

  - Ticket: {{ ticket_key }}
  - WorkPlan: {{ work_plan_path }}
  - Working directory (cloned repo): {{ working_dir }}
  - Write execution summary to: {{ output_path }}
  - Write reasoning diary to: {{ reasoning_path }}

  ## CRITICAL EXECUTION RULES

  - **Execute all steps sequentially without stopping.** After each tool call completes, immediately make the next tool call — never emit a text-only response mid-session.
  - **The session is complete only when you have written the execution summary JSON to `{{ output_path }}` and verified it exists.**
  - Text responses without tool calls end the session — only produce one at the very end, after the summary file is verified.

  ## Step 1: Load Developer Rules and Read WorkPlan

  Call `get_developer_rules`, then immediately read the WorkPlan:
  ```
  cat {{ work_plan_path }}
  ```
  Extract: `ticket_key`, `summary`, `tasks`, `approach`.

  ## Step 2: Confirm Working Directory and Set Up Environment

  First confirm the working directory:
  ```
  pwd && git remote get-url origin
  ```

  Then call `get_project_setup` to retrieve the platform-specific setup commands for
  this project:
  ```
  get_project_setup("{{ ticket_key }}")
  ```

  Run each command in `setup_commands` in order. These commands include venv
  activation as a prefix — run them exactly as returned.

  Store the `test_command` and `lint_command` values — use them verbatim in
  Steps 5 and 6 instead of hardcoding any commands.

  **All subsequent shell commands that require the venv must use the same
  `. venv/bin/activate &&` prefix that the setup_commands use.**

  ## Step 3: Create Feature Branch

  Generate a branch name following the repository convention:
  - Take the WorkPlan `summary` field
  - Convert to lowercase, replace spaces and special chars with hyphens
  - Truncate to 40 characters, trim trailing hyphens
  - Branch name: `feature/{{ ticket_key }}+{slug}` (note: `+` separator between ticket and slug)

  Run:
  ```
  git checkout -b feature/{{ ticket_key }}+{slug}
  ```

  If the branch already exists, append `-2` (and increment until unique).

  ## Step 4: Implement Tasks

  For each task in the WorkPlan `tasks` array (in order by `id`):

  1. Read the `description` carefully — it tells you exactly what to implement
  2. Review the `files_likely_affected` list to understand scope
  3. Read those files to understand existing patterns and conventions
  4. Make the described code changes — be precise and minimal, follow existing code style
  5. Do NOT commit after each task; accumulate all changes

  **Implementation principles:**
  - Match the coding style, indentation, and patterns of existing files
  - Do not add features beyond what the task describes
  - Do not add docstrings or comments to code you didn't change
  - Do not refactor unrelated code

  **File editing rules — CRITICAL:**
  - Always use the `write_file` or `str_replace` tools from the developer extension to create or modify files
  - NEVER write file content via shell heredocs (`cat << 'EOF'`, `python - << 'PY'`, etc.) — heredocs corrupt escape sequences (e.g. `\n`, `\t`), backslashes, quotes, and f-strings, causing syntax errors
  - If you need to replace a specific section of a file, read the file first then use `str_replace` with exact context lines

  ## Step 5: Run Checks

  After implementing all tasks:

  ### Build Check
  Run Python compile check on all modified files:
  ```
  . venv/bin/activate && python -m py_compile <modified_file_1> <modified_file_2> ...
  ```
  If that passes, also verify imports:
  ```
  . venv/bin/activate && python -m pytest --collect-only -q 2>&1 | tail -5
  ```
  Record: `"pass"` if no errors, `"fail"` if any error.

  ### Test Check
  Run the test suite using the `test_command` returned by `get_project_setup` in Step 2:
  ```
  <test_command>
  ```
  Record:
  - `"pass"` if all tests pass
  - `"fail"` if any tests fail
  - `"skipped"` if tests directory doesn't exist or pytest is not available

  ### Files Changed
  Get the list of modified files:
  ```
  git diff --name-only
  git ls-files --others --exclude-standard
  ```
  Combine into a single list of changed and new files.

  ## Step 6: Commit Changes

  Before staging, run pre-commit hooks (DR-001 — mandatory) using the `lint_command`
  returned by `get_project_setup` in Step 2:
  ```
  <lint_command>
  ```
  If pre-commit reports fixable issues it auto-fixed them — re-run once more to confirm clean:
  ```
  <lint_command>
  ```
  If pre-commit fails with un-fixable errors, fix them before continuing.

  Stage all changes:
  ```
  git add -A
  ```

  Commit with a conventional commit message:
  ```
  git commit -m "feat({{ ticket_key }}): {work_plan summary}

  Implements WorkPlan tasks for {{ ticket_key }}."
  ```

  Get the commit SHA:
  ```
  git rev-parse HEAD
  ```

  **IMPORTANT safety constraints:**
  - NEVER commit to `main` or any pre-existing branch
  - NEVER run `git reset --hard` or `git force`
  - NEVER delete branches

  ## Step 7: Push Branch and Create Pull Request

  Push the feature branch to the remote:
  ```
  git push origin feature/{{ ticket_key }}+{slug}
  ```

  Build the PR description:
  1. Check if a PR template exists:
     ```
     test -f .github/pull_request_template.md && echo "exists" || echo "missing"
     ```
  2. If the template **exists**, read it and fill in the sections:
     - **Description**: WorkPlan `summary` and `approach`
     - **JIRA Ticket**: Ticket ID = `{{ ticket_key }}`, Link = `https://mirandags.atlassian.net/browse/{{ ticket_key }}`
     - **Type of Change**: mark the relevant checkbox based on the WorkPlan
     - **Changes Made**: list each task from the WorkPlan
     - **Testing**: reflect actual build/test results from Step 5 (Run Checks)
  3. If the template **does not exist**, use a minimal description with the same information.

  Write the PR body to a temp file, then create a PR:
  ```
  cat > /tmp/pr_body_{{ ticket_key }}.md << 'PR_EOF'
  <filled-in PR body>
  PR_EOF

  gh pr create \
    --title "[{{ ticket_key }}] {WorkPlan summary}" \
    --body-file /tmp/pr_body_{{ ticket_key }}.md \
    --base main
  ```

  Capture the PR URL from the output of `gh pr create`. If `gh` is not available or the push fails, record `pr_url` as `""` in the summary and continue.

  ## Step 8: Write Execution Diary

  Append an execution diary to `{{ reasoning_path }}` (do not overwrite — append).
  This is for debugging only and will NOT be committed.

  ```
  === EXECUTION DIARY ===

  Files changed:
  <For each file: what you changed and why>

  Decisions made:
  <Any non-obvious choices — why you picked this approach over alternatives>

  What went well:
  <Steps that were straightforward>

  What was uncertain:
  <Anything you had to guess at or work around>
  ```

  ## Step 9: Write Summary File and Call final_output

  First, write the execution summary JSON to `{{ output_path }}` so the dispatcher
  can read it (use `write_file` — do not use a shell heredoc):

  On success the content should be:
  ```json
  {
    "ticket_key": "{{ ticket_key }}",
    "branch": "feature/{{ ticket_key }}+{slug}",
    "build": "pass",
    "tests": "pass",
    "files_changed": ["list of changed files"],
    "commit_sha": "<full sha>",
    "pr_url": "<GitHub PR URL or empty string>",
    "status": "success"
  }
  ```

  If any unrecoverable error occurred:
  ```json
  {
    "ticket_key": "{{ ticket_key }}",
    "branch": "",
    "build": "fail",
    "tests": "skipped",
    "files_changed": [],
    "commit_sha": "",
    "pr_url": "",
    "status": "failed",
    "error": "<description of the error>"
  }
  ```

  Status rules:
  - `"success"`: build=pass AND tests=pass
  - `"partial"`: build=pass AND tests=fail
  - `"failed"`: build=fail

  Then call the `final_output` tool with the **same values** to end the session.
