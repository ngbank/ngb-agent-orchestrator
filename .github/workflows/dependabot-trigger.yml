name: Trigger Dependabot

on:
  workflow_dispatch:
    inputs:
      ecosystem:
        description: "Ecosystem to annotate in trigger comment"
        required: true
        default: "pip"
        type: choice
        options:
          - pip
          - github-actions
      directory:
        description: "Directory to annotate in trigger comment"
        required: true
        default: "/"
        type: string

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Nudge Dependabot by updating config timestamp
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_TRIGGER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          file=".github/dependabot.yml"
          if [[ ! -f "$file" ]]; then
            echo "::error::Missing $file."
            exit 1
          fi

          marker="# manual-trigger"
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          line="$marker ecosystem=${{ inputs.ecosystem }} directory=${{ inputs.directory }} at=$timestamp"

          if grep -q "^$marker" "$file"; then
            sed -i "s|^$marker.*|$line|" "$file"
          else
            printf "\n%s\n" "$line" >> "$file"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "$file"; then
            echo "No changes detected; nothing to commit."
            exit 0
          fi

          git add "$file"
          git commit -m "ci: nudge dependabot run [skip ci]"

          branch="${GITHUB_REF#refs/heads/}"
          git push origin "HEAD:$branch"

          echo "Updated $file and pushed to $branch. Dependabot should re-evaluate version updates shortly."
