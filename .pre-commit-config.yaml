# Restrict every hook to the pre-commit stage by default, so that the new
# post-checkout / post-merge / post-rewrite hook types (used only by the
# drift-guard hook below) don't accidentally trigger the full lint+test suite
# on every branch switch or `git pull`. Individual hooks can opt in to other
# stages with an explicit `stages:` field.
default_stages: [pre-commit]

repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # ── Python formatting ─────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.13

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)

  # ── Python linting ────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8

  # ── Python type checking ──────────────────────────────────────────────────
  # mypy runs as a local hook (not pre-commit/mirrors-mypy) so it type-checks
  # against .venv, where the project's actual runtime dependencies (textual,
  # litellm, etc.) are installed. mirrors-mypy's isolated hook environment
  # only had `additional_dependencies: [types-requests]`, so any import it
  # couldn't resolve (e.g. `textual`) silently became `Any` under
  # --ignore-missing-imports — masking real type errors in ace/tui/,
  # dispatcher/tui/, and elsewhere until someone ran mypy locally against
  # .venv directly. Args/excludes beyond `exclude:` below are already
  # declared in [tool.mypy] in pyproject.toml, which mypy reads
  # automatically from the repo root. tests/ is excluded to match
  # pyrightconfig.json's `"ignore": ["tests"]` — mocking/stub-heavy test
  # code is deliberately exempt from strict type checking in this repo.
  #
  # Pyright runs Pylance's analysis engine — catches possibly-unbound symbols,
  # narrowing failures, and signature mismatches that mypy misses. Scope and
  # strictness are configured in pyrightconfig.json (tests are excluded).
  # Runs via the project venv so library types resolve correctly.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/python -m mypy
        language: system
        types: [python]
        exclude: ^(venv/|state/migrations/|tests/)

      - id: check-no-print
        name: check-no-print
        entry: .venv/bin/python scripts/check_no_print.py
        language: system
        types: [python]
        exclude: ^(scripts/|tests/)

      - id: check-no-fstring-log
        name: check-no-fstring-log
        entry: .venv/bin/python scripts/check_no_fstring_log.py
        language: system
        types: [python]

      - id: pyright
        name: pyright
        entry: .venv/bin/python -m pyright
        language: system
        pass_filenames: false
        always_run: true

  # ── Editable install drift guard ──────────────────────────────────────────
  # Editable installs bind top-level package names in a generated finder module
  # at install time. When pyproject.toml's [tool.setuptools.packages.find]
  # include list changes on branch checkout / pull / rebase, entry-point
  # scripts like `dispatcher-tui` (whose sys.path[0] is venv/bin, not the repo
  # root) will fail with ModuleNotFoundError until the editable install is
  # refreshed. This hook auto-runs `pip install -e .` whenever pyproject.toml
  # differs between the previous and new refs, so the drift never surfaces to
  # the developer. Installed via `pre-commit install --hook-type
  # post-checkout --hook-type post-merge --hook-type post-rewrite` (handled
  # automatically by setup-env.sh).
  - repo: local
    hooks:
      - id: refresh-editable-install
        name: refresh editable install (pyproject.toml drift guard)
        entry: .venv/bin/pip install --quiet -e .
        language: system
        pass_filenames: false
        stages: [post-checkout, post-merge, post-rewrite]
        files: ^pyproject\.toml$

  # ── Tests ─────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest tests/ -q --tb=short
        language: system
        pass_filenames: false
        always_run: true

  # ── SQL migration safety ──────────────────────────────────────────────────
      - id: check-sql-migrations
        name: check-sql-migrations
        entry: .venv/bin/python scripts/check_sql_migrations.py
        language: system
        files: ^state/migrations/.*\.sql$
        pass_filenames: true

  # ── Commit message convention ─────────────────────────────────────────────
  # type(scope): description, e.g. "fix(AOS-280): ..." or "feat: ...".
  # scope is optional; when present it's a ticket ID (AOS-123) or short topic.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, refactor, docs, style, test]
